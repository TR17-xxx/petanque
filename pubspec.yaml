name: petanque_score
description: "Pétanque Score - Compteur de points et tournois"
publish_to: 'none'
version: 1.3.0+5

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  provider: ^6.1.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0
  camera: ^0.11.0
  image_picker: ^1.1.0
  image: ^4.3.0
  lucide_icons: ^0.257.0
  http: ^1.2.0
  uuid: ^4.5.0
  path_provider: ^2.1.0
  sensors_plus: ^7.0.0
  package_info_plus: ^8.0.0
  dio: ^5.4.0
  in_app_purchase: ^3.2.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo-app.png"
  adaptive_icon_background: "#F8FAFC"
  adaptive_icon_foreground: "assets/images/logo-app.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
